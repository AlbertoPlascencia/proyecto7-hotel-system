   <script>const backgrounds = ['PRIMERAIMAGEN.jpeg',
    '2020.jpeg'];
 
 let currentBackgroundIndex = 0;
 
 function changeBackground() {
    const body = document.querySelector('body');
    const nextBackgroundIndex = (currentBackgroundIndex + 1) % backgrounds.length;
    const nextBackground = `url('${backgrounds[nextBackgroundIndex]}')`;
    body.style.backgroundImage = `url('${backgrounds[currentBackgroundIndex]}'), ${nextBackground}`;
    currentBackgroundIndex = nextBackgroundIndex;
 }
 
 setInterval(changeBackground, 2000);
 </script>
